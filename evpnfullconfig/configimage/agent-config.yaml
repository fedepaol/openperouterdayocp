apiVersion: v1alpha1
metadata:
  name: sno-lab
  namespace: cluster0
additionalNTPSources:
- 10.100.0.1
rendezvousIP: 192.168.110.2
hosts:
- hostname: master-0
  interfaces:
  - name: enp2s0
    macAddress: 00:48:0f:c8:e2:0f
  - name: eth1
    macAddress: 00:48:0f:c8:e2:10
  networkConfig:
    interfaces:
    - name: br0
      type: linux-bridge
      state: up
      ipv4:
        enabled: true
        auto-dns: false
        address:
        - ip: 192.168.110.2
          prefix-length: 24
        dhcp: false
      bridge:
        port:
        - name: dummy0
    - name: dummy0
      type: dummy
      state: up
      ipv4:
        enabled: false
      ipv6:
        enabled: false
    - name: enp2s0
      type: ethernet
      state: up
      mac-address: 00:48:0f:c8:e2:0f
      ipv4:
        enabled: true
        address:
        - ip: 192.168.111.80
          prefix-length: 24
        dhcp: false
    - name: enp1s0
      type: ethernet
      state: up
      ipv4:
        enabled: false
      ipv6:
        enabled: false
    - name: enp3s0
      type: ethernet
      state: up
      ipv4:
        enabled: true
        address:
        - ip: 192.168.150.20
          prefix-length: 24
        dhcp: false
      ipv6:
        enabled: false
    dns-resolver:
      config:
        server:
        - 192.168.110.1
    routes:
      config:
      - destination: 0.0.0.0/0
        next-hop-address: 192.168.110.1
        next-hop-interface: br0
        table-id: 254
      - destination: 192.168.150.0/24
        next-hop-interface: enp3s0
        table-id: 254
